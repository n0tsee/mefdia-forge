name: Build MediaForge

# Собирает установщики под Windows и macOS в облаке GitHub.
# - Пуш тега вида v1.2.3  → создаёт черновик Release с прикреплёнными установщиками.
# - Ручной запуск (Run workflow) или пуш в main → кладёт установщики в Artifacts.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # нужно, чтобы создать Release при пуше тега
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ffmpeg_ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            ffmpeg_ext: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установить Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Кэш Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # --- FFmpeg sidecar: скачиваем статичные бинарники и именуем под target-triple ---
      - name: FFmpeg для Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full.7z"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.7z
          7z x ffmpeg.7z -offmpeg_extracted
          $bin = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $dir = $bin.DirectoryName
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item "$dir/ffmpeg.exe"  "src-tauri/binaries/ffmpeg-${{ matrix.target }}.exe"
          Copy-Item "$dir/ffprobe.exe" "src-tauri/binaries/ffprobe-${{ matrix.target }}.exe"

      - name: FFmpeg для macOS
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          mkdir -p src-tauri/binaries
          curl -L -o ffmpeg.zip  https://evermeet.cx/ffmpeg/getrelease/zip
          curl -L -o ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip
          mv ffmpeg  "src-tauri/binaries/ffmpeg-${{ matrix.target }}"
          mv ffprobe "src-tauri/binaries/ffprobe-${{ matrix.target }}"
          chmod +x src-tauri/binaries/ffmpeg-${{ matrix.target }} src-tauri/binaries/ffprobe-${{ matrix.target }}

      - name: Установить зависимости фронтенда
        run: npm ci

      # --- Сборка + (при теге) публикация Release ---
      - name: Сборка приложения
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "MediaForge ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: "Установщики MediaForge. Windows: .exe/.msi · macOS: .dmg"

      # --- Всегда складываем установщики в Artifacts (для ручных запусков/пушей в main) ---
      - name: Выгрузить установщики (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mediaforge-windows
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Выгрузить установщик (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mediaforge-macos
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn
